<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>BinSmart — Decide en segundos</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c26;
    --border: #2a2a38;
    --accent: #f5c518;
    --accent2: #ff6b2b;
    --green: #22c55e;
    --yellow: #f59e0b;
    --red: #ef4444;
    --text: #f0f0f5;
    --muted: #6b6b80;
    --compra: #16a34a;
    --revisa: #d97706;
    --pasa: #dc2626;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    overflow-x: hidden;
  }

  /* ── HEADER ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px 12px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: rgba(10,10,15,0.95);
    backdrop-filter: blur(12px);
    z-index: 100;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 2px;
    color: var(--accent);
    line-height: 1;
  }

  .logo span { color: var(--accent2); }

  .version-badge {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 3px 8px;
    border-radius: 20px;
  }

  /* ── MAIN ── */
  main { padding: 20px 16px 100px; max-width: 480px; margin: 0 auto; }

  /* ── PRICE SELECTOR ── */
  .price-section { margin-bottom: 20px; }

  .section-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }

  .price-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 6px;
  }

  .price-btn {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    padding: 10px 4px;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
  }

  .price-btn:active { transform: scale(0.93); }

  .price-btn.selected {
    background: var(--accent);
    border-color: var(--accent);
    color: #000;
  }

  /* ── UPLOAD BUTTONS ── */
  .upload-buttons {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 16px;
  }

  .upload-btn {
    background: var(--surface);
    border: 2px dashed var(--border);
    border-radius: 16px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 600;
    padding: 22px 10px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    transition: all 0.15s;
  }

  .upload-btn span:first-child { font-size: 30px; }
  .upload-btn:active { transform: scale(0.96); border-color: var(--accent); background: var(--surface2); }
  .upload-btn.has-image { border-style: solid; border-color: var(--accent); }

  /* ── UPLOAD ZONE ── */
  .upload-zone {
    background: var(--surface);
    border: 2px dashed var(--border);
    border-radius: 18px;
    padding: 32px 20px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
    margin-bottom: 16px;
  }

  .upload-zone:active { transform: scale(0.98); border-color: var(--accent); }
  .upload-zone.has-image { border-style: solid; border-color: var(--accent); padding: 0; }

  .upload-zone input { display: none; }

  .upload-icon {
    font-size: 40px;
    margin-bottom: 10px;
    display: block;
  }

  .upload-title {
    font-size: 17px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 4px;
  }

  .upload-sub {
    font-size: 13px;
    color: var(--muted);
  }

  #preview-img {
    width: 100%;
    max-height: 280px;
    object-fit: contain;
    border-radius: 16px;
    display: none;
  }

  /* ── CONTEXT INPUT ── */
  .context-input {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    padding: 12px 14px;
    width: 100%;
    margin-bottom: 16px;
    outline: none;
    transition: border-color 0.2s;
  }

  .context-input:focus { border-color: var(--accent); }
  .context-input::placeholder { color: var(--muted); }

  /* ── ANALYZE BUTTON ── */
  #analyze-btn {
    width: 100%;
    background: var(--accent);
    border: none;
    border-radius: 14px;
    color: #000;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 2px;
    padding: 16px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-bottom: 24px;
  }

  #analyze-btn:active { transform: scale(0.97); background: #e0b015; }
  #analyze-btn:disabled { background: var(--surface2); color: var(--muted); cursor: not-allowed; }

  /* ── LOADING ── */
  .loading-card {
    display: none;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 32px 20px;
    text-align: center;
    margin-bottom: 20px;
  }

  .spinner {
    width: 44px;
    height: 44px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text {
    font-size: 15px;
    color: var(--muted);
  }

  .loading-sub {
    font-size: 12px;
    color: var(--muted);
    margin-top: 6px;
    font-family: 'DM Mono', monospace;
  }

  /* ── RESULT CARD ── */
  .result-card {
    display: none;
    border-radius: 20px;
    overflow: hidden;
    border: 1px solid var(--border);
    margin-bottom: 20px;
    animation: slideUp 0.35s ease;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Veredicto header */
  .verdict-header {
    padding: 20px;
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .verdict-header.compra { background: linear-gradient(135deg, #16a34a22, #16a34a11); border-bottom: 1px solid #16a34a44; }
  .verdict-header.revisa { background: linear-gradient(135deg, #d9770622, #d9770611); border-bottom: 1px solid #d9770644; }
  .verdict-header.pasa   { background: linear-gradient(135deg, #dc262622, #dc262611); border-bottom: 1px solid #dc262644; }

  .verdict-emoji { font-size: 48px; line-height: 1; }

  .verdict-info { flex: 1; }

  .verdict-word {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 36px;
    letter-spacing: 3px;
    line-height: 1;
  }

  .verdict-word.compra { color: var(--green); }
  .verdict-word.revisa { color: var(--yellow); }
  .verdict-word.pasa   { color: var(--red); }

  .verdict-reason {
    font-size: 13px;
    color: var(--muted);
    margin-top: 2px;
    line-height: 1.4;
  }

  .roi-badge {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 8px 12px;
    text-align: center;
    min-width: 72px;
  }

  .roi-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 24px;
    color: var(--accent);
    line-height: 1;
  }

  .roi-label {
    font-size: 10px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.5px;
  }

  /* Product body */
  .product-body { background: var(--surface); }

  /* Product image row */
  .product-image-row {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
  }

  .product-thumb {
    width: 80px;
    height: 80px;
    border-radius: 12px;
    object-fit: cover;
    border: 1px solid var(--border);
    background: var(--surface2);
    flex-shrink: 0;
  }

  .product-thumb-placeholder {
    width: 80px;
    height: 80px;
    border-radius: 12px;
    background: var(--surface2);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    flex-shrink: 0;
  }

  .product-info { flex: 1; min-width: 0; }

  .product-name {
    font-size: 16px;
    font-weight: 700;
    color: var(--text);
    line-height: 1.3;
    margin-bottom: 4px;
  }

  .product-cat {
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    color: var(--accent2);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .product-desc {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.4;
  }

  /* Quick stats */
  .quick-stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1px;
    background: var(--border);
    border-top: 1px solid var(--border);
  }

  .stat-box {
    background: var(--surface);
    padding: 14px 16px;
  }

  .stat-label {
    font-size: 10px;
    font-family: 'DM Mono', monospace;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .stat-value {
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
    line-height: 1.2;
  }

  .stat-value.green { color: var(--green); }
  .stat-value.yellow { color: var(--yellow); }

  /* Expandable details */
  .details-toggle {
    width: 100%;
    background: var(--surface2);
    border: none;
    border-top: 1px solid var(--border);
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    padding: 14px 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: space-between;
    transition: color 0.2s;
  }

  .details-toggle:active { color: var(--text); }

  .details-toggle .arrow {
    transition: transform 0.3s;
    font-size: 16px;
  }

  .details-toggle.open .arrow { transform: rotate(180deg); }

  .details-panel {
    display: none;
    padding: 0 20px 20px;
    background: var(--surface);
    border-top: 1px solid var(--border);
  }

  .details-panel.open { display: block; }

  .detail-row {
    display: flex;
    gap: 10px;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
    align-items: flex-start;
  }

  .detail-row:last-child { border-bottom: none; }

  .detail-icon { font-size: 18px; flex-shrink: 0; margin-top: 1px; }

  .detail-content { flex: 1; }

  .detail-label {
    font-size: 10px;
    font-family: 'DM Mono', monospace;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 3px;
  }

  .detail-text {
    font-size: 14px;
    color: var(--text);
    line-height: 1.5;
  }

  /* Tip box */
  .tip-box {
    background: linear-gradient(135deg, #f5c51811, #ff6b2b0a);
    border: 1px solid #f5c51830;
    border-radius: 12px;
    padding: 12px 14px;
    margin-top: 16px;
    display: flex;
    gap: 10px;
    align-items: flex-start;
  }

  .tip-icon { font-size: 18px; flex-shrink: 0; }

  .tip-text {
    font-size: 13px;
    color: var(--text);
    line-height: 1.5;
  }

  /* Confidence bar */
  .confidence-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 20px;
    background: var(--surface2);
    border-top: 1px solid var(--border);
  }

  .confidence-label {
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    color: var(--muted);
    white-space: nowrap;
  }

  .confidence-bar {
    flex: 1;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .confidence-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.8s ease;
  }

  .confidence-num {
    font-size: 12px;
    font-family: 'DM Mono', monospace;
    color: var(--accent);
  }

  /* Action buttons */
  .action-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-top: 16px;
  }

  .action-btn {
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 600;
    padding: 13px 10px;
    cursor: pointer;
    text-align: center;
    transition: all 0.15s;
  }

  .action-btn:active { transform: scale(0.96); }
  .action-btn.primary { background: var(--accent2); border-color: var(--accent2); color: #fff; }

  /* Error */
  .error-card {
    display: none;
    background: #2a1010;
    border: 1px solid var(--red);
    border-radius: 16px;
    padding: 20px;
    text-align: center;
    margin-bottom: 20px;
  }

  .error-icon { font-size: 32px; margin-bottom: 10px; }
  .error-text { font-size: 15px; color: #ff9999; font-weight: 600; margin-bottom: 6px; }
  .error-sub { font-size: 13px; color: var(--muted); }

  /* History strip */
  .history-section { margin-top: 24px; }

  .history-strip {
    display: flex;
    gap: 10px;
    overflow-x: auto;
    padding-bottom: 8px;
    scrollbar-width: none;
  }

  .history-strip::-webkit-scrollbar { display: none; }

  .history-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px 12px;
    min-width: 120px;
    cursor: pointer;
    flex-shrink: 0;
    transition: border-color 0.2s;
  }

  .history-item:active { border-color: var(--accent); }

  .history-verdict { font-size: 18px; margin-bottom: 4px; }
  .history-name { font-size: 12px; font-weight: 600; color: var(--text); line-height: 1.3; margin-bottom: 2px; }
  .history-price { font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; }

  /* Bottom nav */
  .bottom-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: rgba(10,10,15,0.97);
    border-top: 1px solid var(--border);
    backdrop-filter: blur(16px);
    padding: 10px 20px 20px;
    display: flex;
    gap: 10px;
    max-width: 480px;
    margin: 0 auto;
  }

  #new-scan-btn {
    flex: 1;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 600;
    padding: 13px;
    cursor: pointer;
    display: none;
  }

  /* Server config */
  .server-config {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px 14px;
  }

  .server-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--muted);
    flex-shrink: 0;
  }

  .server-dot.ok { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .server-dot.err { background: var(--red); }

  .server-url {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .server-edit {
    font-size: 12px;
    color: var(--accent);
    cursor: pointer;
    font-weight: 600;
    white-space: nowrap;
  }
</style>
</head>
<body>

<header>
  <div class="logo">Bin<span>Smart</span></div>
  <div class="version-badge">v2.0 · Miami</div>
</header>

<main>

  <!-- Server config -->
  <div class="server-config">
    <div class="server-dot" id="server-dot"></div>
    <div class="server-url" id="server-url-display">Configurando servidor...</div>
    <div class="server-edit" onclick="editServer()">Editar</div>
  </div>

  <!-- Price selector -->
  <div class="price-section">
    <div class="section-label">Precio del Bin</div>
    <div class="price-grid">
      <button class="price-btn" onclick="selectPrice(this, 1)">$1</button>
      <button class="price-btn" onclick="selectPrice(this, 2)">$2</button>
      <button class="price-btn" onclick="selectPrice(this, 4)">$4</button>
      <button class="price-btn" onclick="selectPrice(this, 6)">$6</button>
      <button class="price-btn" onclick="selectPrice(this, 8)">$8</button>
      <button class="price-btn" onclick="selectPrice(this, 12)">$12</button>
      <button class="price-btn" onclick="selectPrice(this, 16)">$16</button>
    </div>
  </div>

  <!-- Hidden inputs -->
  <input type="file" id="file-camera" accept="image/*" capture="environment" style="display:none">
  <input type="file" id="file-gallery" accept="image/*" style="display:none">

  <!-- Preview zone (hidden until image selected) -->
  <div class="upload-zone has-image" id="preview-zone" style="display:none; padding:0; margin-bottom:12px;" onclick="document.getElementById('file-gallery').click()">
    <img id="preview-img" alt="Preview" style="width:100%;max-height:280px;object-fit:contain;border-radius:16px;">
  </div>

  <!-- Camera + Gallery buttons -->
  <div class="upload-buttons" id="upload-buttons">
    <button class="upload-btn camera-btn" onclick="document.getElementById('file-camera').click()">
      <span>📷</span>
      <span>Cámara</span>
    </button>
    <button class="upload-btn gallery-btn" onclick="document.getElementById('file-gallery').click()">
      <span>🖼️</span>
      <span>Galería</span>
    </button>
  </div>

  <!-- Context hint -->
  <input type="text" class="context-input" id="context-input"
    placeholder="Tip opcional: 'tiene etiqueta Amazon', 'caja abierta', 'marca Dell'...">

  <!-- Analyze button -->
  <button id="analyze-btn" onclick="analyze()" disabled>
    <span>⚡</span> ANALIZAR
  </button>

  <!-- Loading -->
  <div class="loading-card" id="loading-card">
    <div class="spinner"></div>
    <div class="loading-text">Identificando producto...</div>
    <div class="loading-sub" id="loading-sub">Analizando imagen</div>
  </div>

  <!-- Error -->
  <div class="error-card" id="error-card">
    <div class="error-icon">⚠️</div>
    <div class="error-text" id="error-text">Error al analizar</div>
    <div class="error-sub" id="error-sub"></div>
  </div>

  <!-- Result card -->
  <div class="result-card" id="result-card">

    <!-- Verdict header -->
    <div class="verdict-header" id="verdict-header">
      <div class="verdict-emoji" id="verdict-emoji"></div>
      <div class="verdict-info">
        <div class="verdict-word" id="verdict-word"></div>
        <div class="verdict-reason" id="verdict-reason"></div>
      </div>
      <div class="roi-badge" id="roi-badge">
        <div class="roi-num" id="roi-num">—</div>
        <div class="roi-label">ROI</div>
      </div>
    </div>

    <!-- Product body -->
    <div class="product-body">

      <!-- Image + info row -->
      <div class="product-image-row">
        <div class="product-thumb-placeholder" id="product-thumb-placeholder">📦</div>
        <img class="product-thumb" id="product-thumb" style="display:none" alt="Producto">
        <div class="product-info">
          <div class="product-cat" id="product-cat"></div>
          <div class="product-name" id="product-name"></div>
          <div class="product-desc" id="product-desc"></div>
        </div>
      </div>

      <!-- Quick stats -->
      <div class="quick-stats">
        <div class="stat-box">
          <div class="stat-label">💰 Valor Mercado</div>
          <div class="stat-value green" id="stat-market"></div>
        </div>
        <div class="stat-box">
          <div class="stat-label">📍 Reventa Miami</div>
          <div class="stat-value yellow" id="stat-resale"></div>
        </div>
        <div class="stat-box">
          <div class="stat-label">🏠 Uso Personal</div>
          <div class="stat-value" id="stat-personal"></div>
        </div>
        <div class="stat-box">
          <div class="stat-label">🛒 Mejor Canal</div>
          <div class="stat-value" id="stat-channel"></div>
        </div>
      </div>

      <!-- Confidence -->
      <div class="confidence-row">
        <div class="confidence-label">CONFIANZA</div>
        <div class="confidence-bar">
          <div class="confidence-fill" id="confidence-fill" style="width:0%"></div>
        </div>
        <div class="confidence-num" id="confidence-num">0%</div>
      </div>

      <!-- Expandable details -->
      <button class="details-toggle" id="details-toggle" onclick="toggleDetails()">
        <span>Ver más detalles</span>
        <span class="arrow">▼</span>
      </button>

      <div class="details-panel" id="details-panel">

        <div class="detail-row">
          <div class="detail-icon">💡</div>
          <div class="detail-content">
            <div class="detail-label">Para qué sirve</div>
            <div class="detail-text" id="detail-use"></div>
          </div>
        </div>

        <div class="detail-row">
          <div class="detail-icon">👤</div>
          <div class="detail-content">
            <div class="detail-label">Quién lo usa</div>
            <div class="detail-text" id="detail-who"></div>
          </div>
        </div>

        <div class="detail-row">
          <div class="detail-icon">🎁</div>
          <div class="detail-content">
            <div class="detail-label">Uso personal / regalo</div>
            <div class="detail-text" id="detail-personal"></div>
          </div>
        </div>

        <div class="tip-box">
          <div class="tip-icon">🧠</div>
          <div class="tip-text" id="detail-tip"></div>
        </div>

      </div>

      <!-- Action buttons -->
      <div style="padding: 16px 20px 20px;">
        <div class="action-row">
          <button class="action-btn" onclick="newScan()">🔄 Nuevo scan</button>
          <button class="action-btn primary" onclick="shareResult()">📤 Compartir</button>
        </div>
      </div>

    </div>
  </div>

  <!-- History -->
  <div class="history-section" id="history-section" style="display:none">
    <div class="section-label">Hoy en la bodega</div>
    <div class="history-strip" id="history-strip"></div>
  </div>

</main>

<script>
// ── CONFIG ──
const STORAGE_KEY = 'binsmart_server_url';
const HISTORY_KEY = 'binsmart_history_v2';
const DEFAULT_SERVER = 'https://binsmart-server.onrender.com';

let serverUrl = localStorage.getItem(STORAGE_KEY) || DEFAULT_SERVER;
let selectedPrice = null;
let selectedFile = null;
let history = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
let currentResult = null;

// ── INIT ──
document.addEventListener('DOMContentLoaded', () => {
  updateServerDisplay();
  checkServer();
  renderHistory();

  document.getElementById('file-camera').addEventListener('change', handleFile);
  document.getElementById('file-gallery').addEventListener('change', handleFile);
});

// ── SERVER ──
function updateServerDisplay() {
  document.getElementById('server-url-display').textContent = serverUrl.replace('https://', '');
}

async function checkServer() {
  const dot = document.getElementById('server-dot');
  try {
    const r = await fetch(`${serverUrl}/health`, { signal: AbortSignal.timeout(5000) });
    const data = await r.json();
    if (data.status === 'ok') {
      dot.className = 'server-dot ok';
    } else {
      dot.className = 'server-dot err';
    }
  } catch {
    dot.className = 'server-dot err';
  }
}

function editServer() {
  const url = prompt('URL del servidor:', serverUrl);
  if (url) {
    serverUrl = url.trim().replace(/\/$/, '');
    localStorage.setItem(STORAGE_KEY, serverUrl);
    updateServerDisplay();
    checkServer();
  }
}

// ── PRICE ──
function selectPrice(btn, price) {
  document.querySelectorAll('.price-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  selectedPrice = price;
  updateAnalyzeBtn();
}

// ── FILE ──
function handleFile(e) {
  const file = e.target.files[0];
  if (!file) return;
  selectedFile = file;

  const reader = new FileReader();
  reader.onload = (ev) => {
    document.getElementById('preview-img').src = ev.target.result;
    document.getElementById('preview-zone').style.display = 'block';
    // Highlight whichever button was used
    document.querySelectorAll('.upload-btn').forEach(b => b.classList.add('has-image'));
  };
  reader.readAsDataURL(file);
  updateAnalyzeBtn();
}

function updateAnalyzeBtn() {
  const btn = document.getElementById('analyze-btn');
  btn.disabled = !(selectedFile && selectedPrice);
}

// ── ANALYZE ──
async function analyze() {
  if (!selectedFile || !selectedPrice) return;

  // Show loading
  document.getElementById('result-card').style.display = 'none';
  document.getElementById('error-card').style.display = 'none';
  document.getElementById('loading-card').style.display = 'block';
  document.getElementById('analyze-btn').disabled = true;

  const loadingMessages = [
    'Identificando producto...',
    'Buscando precio de mercado...',
    'Calculando ROI...',
    'Preparando veredicto...'
  ];
  let msgIdx = 0;
  const msgInterval = setInterval(() => {
    msgIdx = (msgIdx + 1) % loadingMessages.length;
    document.getElementById('loading-sub').textContent = loadingMessages[msgIdx];
  }, 1200);

  try {
    // Convert to base64
    const base64 = await fileToBase64(selectedFile);
    const mimeType = selectedFile.type || 'image/jpeg';
    const context = document.getElementById('context-input').value.trim();

    const response = await fetch(`${serverUrl}/analyze`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        image: base64,
        mimeType,
        binPrice: selectedPrice,
        context
      }),
      signal: AbortSignal.timeout(30000)
    });

    clearInterval(msgInterval);

    if (!response.ok) {
      const err = await response.json().catch(() => ({}));
      throw new Error(err.error || `HTTP ${response.status}`);
    }

    const result = await response.json();
    currentResult = result;
    displayResult(result);
    saveToHistory(result);

  } catch (err) {
    clearInterval(msgInterval);
    showError(err.message);
  } finally {
    document.getElementById('loading-card').style.display = 'none';
    document.getElementById('analyze-btn').disabled = false;
  }
}

function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => {
      const result = reader.result;
      const base64 = result.split(',')[1];
      resolve(base64);
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

// ── DISPLAY RESULT ──
function displayResult(r) {
  const card = document.getElementById('result-card');
  const verdictClass = r.veredicto?.toLowerCase() === 'compra' ? 'compra' :
                       r.veredicto?.toLowerCase() === 'revisa' ? 'revisa' : 'pasa';

  // Verdict header
  const header = document.getElementById('verdict-header');
  header.className = `verdict-header ${verdictClass}`;

  document.getElementById('verdict-emoji').textContent = r.emoji_veredicto || '🟡';
  document.getElementById('verdict-word').textContent = r.veredicto || 'REVISA';
  document.getElementById('verdict-word').className = `verdict-word ${verdictClass}`;
  document.getElementById('verdict-reason').textContent = r.razon_veredicto || '';

  // ROI
  if (r.roi_estimado !== null && r.roi_estimado !== undefined) {
    document.getElementById('roi-num').textContent = `${Math.round(r.roi_estimado)}%`;
  } else {
    document.getElementById('roi-num').textContent = '—';
  }

  // Product info
  document.getElementById('product-cat').textContent = r.categoria || '';
  document.getElementById('product-name').textContent = r.producto || 'Producto';
  document.getElementById('product-desc').textContent = r.descripcion || '';

  // Try to get product image from Google Images search
  loadProductImage(r.imagen_busqueda || r.producto);

  // Quick stats
  document.getElementById('stat-market').textContent = r.valor_mercado || 'N/D';
  document.getElementById('stat-resale').textContent = r.precio_reventa_miami || 'N/D';
  document.getElementById('stat-personal').textContent = r.uso_personal ? r.uso_personal.substring(0, 40) + (r.uso_personal.length > 40 ? '...' : '') : 'N/D';
  document.getElementById('stat-channel').textContent = r.mejor_canal || 'N/D';

  // Confidence
  const conf = r.confianza || 0;
  setTimeout(() => {
    document.getElementById('confidence-fill').style.width = `${conf}%`;
    document.getElementById('confidence-num').textContent = `${conf}%`;
  }, 200);

  // Details
  document.getElementById('detail-use').textContent = r.para_que_sirve || '';
  document.getElementById('detail-who').textContent = r.quien_lo_usa || '';
  document.getElementById('detail-personal').textContent = r.uso_personal || '';
  document.getElementById('detail-tip').textContent = r.tip_rapido || '';

  // Show card
  card.style.display = 'block';
  card.scrollIntoView({ behavior: 'smooth', block: 'start' });

  // Show new scan button
  document.getElementById('new-scan-btn').style.display = 'block';
}

async function loadProductImage(query) {
  // Use the uploaded image as the product thumbnail
  const preview = document.getElementById('preview-img');
  if (preview.src) {
    document.getElementById('product-thumb-placeholder').style.display = 'none';
    const thumb = document.getElementById('product-thumb');
    thumb.src = preview.src;
    thumb.style.display = 'block';
  }
}

function showError(msg) {
  document.getElementById('error-card').style.display = 'block';
  document.getElementById('error-text').textContent = 'Error al analizar';
  document.getElementById('error-sub').textContent = msg.includes('fetch') || msg.includes('Failed')
    ? 'No se puede conectar al servidor. Verifica la URL en "Editar".'
    : msg;
}

// ── DETAILS TOGGLE ──
function toggleDetails() {
  const panel = document.getElementById('details-panel');
  const toggle = document.getElementById('details-toggle');
  panel.classList.toggle('open');
  toggle.classList.toggle('open');
  toggle.querySelector('span').textContent = panel.classList.contains('open') ? 'Ocultar detalles' : 'Ver más detalles';
}

// ── HISTORY ──
function saveToHistory(result) {
  const item = {
    id: Date.now(),
    producto: result.producto,
    veredicto: result.veredicto,
    emoji: result.emoji_veredicto,
    precio_bin: selectedPrice,
    valor_mercado: result.valor_mercado,
    roi: result.roi_estimado,
    timestamp: new Date().toISOString()
  };

  history.unshift(item);
  if (history.length > 20) history = history.slice(0, 20);
  localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
  renderHistory();
}

function renderHistory() {
  if (history.length === 0) return;

  document.getElementById('history-section').style.display = 'block';
  const strip = document.getElementById('history-strip');

  strip.innerHTML = history.slice(0, 10).map(item => `
    <div class="history-item">
      <div class="history-verdict">${item.emoji || '🟡'}</div>
      <div class="history-name">${item.producto?.substring(0, 22) || 'Producto'}${item.producto?.length > 22 ? '...' : ''}</div>
      <div class="history-price">$${item.precio_bin} bin · ${item.valor_mercado || 'N/D'}</div>
    </div>
  `).join('');
}

// ── NEW SCAN ──
function newScan() {
  // Reset UI
  document.getElementById('result-card').style.display = 'none';
  document.getElementById('error-card').style.display = 'none';
  document.getElementById('preview-zone').style.display = 'none';
  document.getElementById('preview-img').src = '';
  document.getElementById('file-camera').value = '';
  document.getElementById('file-gallery').value = '';
  document.querySelectorAll('.upload-btn').forEach(b => b.classList.remove('has-image'));
  document.getElementById('context-input').value = '';
  document.getElementById('product-thumb').style.display = 'none';
  document.getElementById('product-thumb-placeholder').style.display = 'flex';
  document.getElementById('confidence-fill').style.width = '0%';
  document.getElementById('details-panel').classList.remove('open');
  document.getElementById('details-toggle').classList.remove('open');
  document.getElementById('details-toggle').querySelector('span').textContent = 'Ver más detalles';
  document.getElementById('new-scan-btn').style.display = 'none';
  selectedFile = null;
  updateAnalyzeBtn();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ── SHARE ──
function shareResult() {
  if (!currentResult) return;
  const r = currentResult;
  const text = `${r.emoji_veredicto} ${r.veredicto}: ${r.producto}\n💰 ${r.valor_mercado} | 📍 ${r.precio_reventa_miami}\n📊 ROI: ${r.roi_estimado ? Math.round(r.roi_estimado) + '%' : 'N/D'}\n\nAnálisis por BinSmart Miami`;
  if (navigator.share) {
    navigator.share({ title: 'BinSmart', text }).catch(() => {});
  } else {
    navigator.clipboard.writeText(text).then(() => alert('Copiado al portapapeles'));
  }
}
</script>

</body>
</html>
