<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta name="theme-color" content="#F5F2ED"/>
<title>BinSmart</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{background:#F5F2ED;font-family:system-ui,-apple-system,sans-serif;color:#1A1A1A;max-width:480px;margin:0 auto;min-height:100vh;}
  button{font-family:inherit;cursor:pointer;border:none;outline:none;}
  @keyframes spin{to{transform:rotate(360deg)}}
  @keyframes up{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
  @keyframes expandIn{from{opacity:0;max-height:0}to{opacity:1;max-height:2000px}}
  .spinner{width:50px;height:50px;border-radius:50%;border:3px solid #2E7D32;border-top-color:transparent;animation:spin .85s linear infinite;}
  .page{padding:0 18px 60px;display:flex;flex-direction:column;min-height:100vh;}
  .card{background:#fff;border-radius:16px;padding:18px;margin-bottom:12px;box-shadow:0 2px 12px rgba(0,0,0,.05);border:1px solid #EAE4DA;}
  .step-label{display:flex;align-items:center;gap:8px;margin-bottom:14px;}
  .step-n{background:#1B5E20;color:#fff;border-radius:50%;width:20px;height:20px;font-size:11px;font-weight:700;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;}
  .step-txt{font-size:10px;font-weight:700;letter-spacing:2px;color:#9A8070;text-transform:uppercase;}
  .price-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
  .price-btn{padding:13px 0;border-radius:10px;font-weight:800;font-size:15px;transition:all .13s;border:2px solid #E8E0D0;background:#F8F6F2;color:#5A4A3A;}
  .price-btn.sel{border-color:#1B5E20;background:#1B5E20;color:#fff;box-shadow:0 3px 10px rgba(27,94,32,.35);}
  .photo-btns{display:flex;gap:10px;}
  .photo-btn{flex:1;padding:20px 0;border-radius:12px;background:#F8F6F2;border:2px dashed #CCC5B8;display:flex;flex-direction:column;align-items:center;gap:5px;}
  .photo-btn span.ico{font-size:30px;}
  .photo-btn span.lbl{font-size:12px;color:#7A6A5A;font-weight:500;}
  .preview-wrap{position:relative;border-radius:12px;overflow:hidden;border:2px solid #D0E8D0;margin-bottom:2px;}
  .preview-wrap img{width:100%;max-height:200px;object-fit:cover;display:block;}
  .preview-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.3),transparent 50%);}
  .preview-remove{position:absolute;top:8px;right:8px;width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,.92);font-size:15px;font-weight:700;display:flex;align-items:center;justify-content:center;}
  .preview-badge{position:absolute;bottom:8px;left:10px;background:#1B5E20;border-radius:5px;padding:3px 9px;font-size:10px;font-weight:700;color:#fff;letter-spacing:1px;}
  .tips{background:#EBF5EB;border-radius:12px;padding:12px 14px;margin-bottom:16px;border:1px solid #C8E0C8;}
  .tips-title{font-size:10px;font-weight:700;color:#2D6A2D;margin-bottom:6px;letter-spacing:1px;}
  .tip-item{font-size:12px;color:#3A5A3A;margin-bottom:3px;}
  .tip-check{color:#1B5E20;font-weight:700;}
  .main-btn{width:100%;padding:20px;border-radius:14px;font-weight:800;font-size:16px;transition:all .2s;}
  .main-btn.active{background:linear-gradient(135deg,#2E7D32,#1B5E20);color:#fff;box-shadow:0 6px 24px rgba(27,94,32,.4);}
  .main-btn.disabled{background:#E0D8CC;color:#A8A098;cursor:not-allowed;}

  /* Analyzing */
  #screen-analyzing{display:none;min-height:100vh;flex-direction:column;align-items:center;justify-content:center;gap:20px;padding:0 28px;}
  #screen-analyzing.active{display:flex;}

  /* Result — CONDENSED FIRST SCREEN */
  #screen-result{display:none;padding-bottom:30px;animation:up .4s ease;}
  #screen-result.active{display:block;}

  .verdict-hero{padding:26px 20px 22px;text-align:center;position:relative;}
  .verdict-emoji{font-size:46px;line-height:1;margin-bottom:6px;}
  .verdict-word{font-weight:900;font-size:26px;color:#fff;letter-spacing:1px;text-shadow:0 2px 6px rgba(0,0,0,.15);}
  .verdict-sub{font-size:12px;color:rgba(255,255,255,.85);margin-top:4px;}

  .condensed-card{background:#fff;border-radius:18px;margin:-18px 14px 0;position:relative;padding:18px 16px 16px;box-shadow:0 4px 24px rgba(0,0,0,.08);}
  .condensed-name{font-size:19px;font-weight:800;line-height:1.25;margin-bottom:10px;}
  .condensed-prices{display:flex;align-items:center;gap:14px;margin-bottom:4px;}
  .cp-block{flex:1;}
  .cp-label{font-size:9px;color:#9A8070;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:2px;}
  .cp-val{font-size:20px;font-weight:900;}
  .cp-divider{width:1px;height:30px;background:#EAE4DA;}
  .condensed-gain{display:inline-block;margin-top:8px;border-radius:8px;padding:5px 12px;font-size:13px;font-weight:700;}
  .condensed-checklist{margin-top:16px;}
  .condensed-check-title{font-size:10px;font-weight:700;color:#9A8070;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px;}
  .cc-item{display:flex;align-items:flex-start;gap:9px;padding:6px 0;font-size:13.5px;color:#2A2A2A;line-height:1.4;}
  .cc-dot{width:18px;height:18px;border-radius:50%;flex-shrink:0;margin-top:1px;}

  .expand-btn{width:100%;margin-top:16px;padding:14px;border-radius:12px;background:#F8F6F2;border:1.5px solid #E8E0D0;color:#5A4A3A;font-weight:700;font-size:14px;display:flex;align-items:center;justify-content:center;gap:6px;}
  .expand-btn .chev{transition:transform .25s;font-size:11px;}
  .expand-btn.open .chev{transform:rotate(180deg);}

  .full-details{max-height:0;overflow:hidden;opacity:0;transition:max-height .35s ease, opacity .3s ease;}
  .full-details.open{max-height:none;opacity:1;animation:expandIn .4s ease;}
  .full-inner{padding:14px 14px 0;}

  .product-hero{position:relative;width:100%;height:180px;background:#EDE8E0;overflow:hidden;border-radius:14px;margin-bot
